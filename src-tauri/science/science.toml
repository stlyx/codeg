# Scientific research skill metadata. Bundled alongside skills/ and loaded at
# runtime by commands/science.rs (mirrors experts.toml).
#
# Curated from K-Dense-AI/scientific-agent-skills @ 4d97e293 — v1 vendors only
# skills that are MIT-licensed and self-contained (no required cross-skill edges).
#
# Fields beyond the experts.toml set:
#   featured   — surface as a card in the new-session "Scientific Research" tab
#   accent     — color key indexing the literal ACCENTS map in quick-actions.tsx
#                (featured cards only)
#   needs_key  — the skill's primary workflow requires an external API key
#                (shown as a "needs key" badge in the settings matrix)
#   needs_env  — the skill ships scripts that may need a Python/uv environment
#                (shown as a "may need setup" badge)
#
# Icons are lucide-react icon names referenced by the frontend.
# display_name and description fall back to "en" when a locale is missing.
# Supported locales match the frontend i18n set:
#   en, zh-CN, zh-TW, ja, ko, es, de, fr, pt, ar

